<!DOCTYPE html>
<html>
<head>
  <title>HTML Table Example</title>
</head>
<body>

  <h1>Student Marks Table</h1>

  <table border="2" cellpadding="10" cellspacing="5" width="80%" bgcolor="#f9f9f9">
    
    <caption><b>Class 10 - Final Result</b></caption>

    <thead bgcolor="#e0e0e0">
      <tr>
        <th>GR ID</th>
        <th>Name</th>
        <th colspan="3">Course</th>
        <th>Total Marks</th>
      </tr>
      <tr>
        <th>.C</th>
        <th>C++</th>
        <th>HTML</th>
        <th>JS</th>
        <th>REACT JS</th>       
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>1</td>
        <td>Rupali</td>
        <td>95</td>
        <td>98</td>
        <td>92</td>
        <td>285</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Sadhna</td>
        <td>91</td>
        <td>96</td>
        <td>97</td>
        <td>284</td>
      </tr>
    </tbody>

    <tfoot bgcolor="#d0ffd0">
      <tr>
        <td colspan="5" align="right"><b>Average</b></td>
        <td>246.5</td>
      </tr>
    </tfoot>

  </table>

</body>
</html>
